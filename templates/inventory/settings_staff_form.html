{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="heading">
  <h1>{{ title }}</h1>
  <a class="button" href="{% url 'settings_staff_list' %}">Back to List</a>
</section>

<form class="form panel" method="post">
  {% csrf_token %}
  {{ form.non_field_errors }}
  
  {% for field in form %}
    <label>
      {{ field.label }}
      {% if field.field.widget.input_type == "checkbox" %}
        <span style="display: flex; align-items: center; gap: 10px; font-weight: normal;">
          {{ field }} Enable this option
        </span>
      {% else %}
        {{ field }}
      {% endif %}
      
      {% if field.help_text %}
        <small class="field-help" style="color: var(--muted); font-weight: normal;">{{ field.help_text }}</small>
      {% endif %}
      {{ field.errors }}
    </label>
  {% endfor %}

  <button class="button primary">Save Staff Account</button>
</form>
{% endblock %}
