{% extends "base.html" %}
{% block title %}Rename Category{% endblock %}
{% block content %}
<section class="heading">
  <h1>Rename Category: {{ category.name }}</h1>
  <a class="button" href="{% url 'settings_category_list' %}">Back to List</a>
</section>

<form class="form panel" method="post">
  {% csrf_token %}
  {{ form.non_field_errors }}
  
  <label>Category Name
    {{ form.name }}
    {{ form.name.errors }}
  </label>

  <button class="button primary">Save Changes</button>
</form>
{% endblock %}
