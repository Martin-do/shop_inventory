{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="heading">
  <h1>{{ title }}</h1>
</section>

<form class="form panel" method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.non_field_errors }}
  {% for field in form %}
    <div class="form-group" id="group-{{ field.name }}">
      <label>{{ field.label }} {{ field }}</label>
      {% if field.help_text %}<small class="field-help">{{ field.help_text }}</small>{% endif %}
      {{ field.errors }}
    </div>
  {% endfor %}
  <button class="button primary">Save Product</button>
</form>

<!-- Camera Capture UI Modal -->
<div id="camera-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;">
  <div style="background: var(--panel); padding: 20px; border-radius: 12px; max-width: 500px; width: 90%; text-align: center; box-shadow: var(--shadow-lg);">
    <h3 style="margin-top: 0; margin-bottom: 15px;">Capture Product Photo</h3>
    <div style="position: relative; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; aspect-ratio: 4/3;">
      <video id="webcam-preview" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
      <canvas id="capture-canvas" style="display: none;"></canvas>
    </div>
    <div style="display: flex; gap: 10px; justify-content: center;">
      <button type="button" id="btn-snap" class="button primary">Snap Photo</button>
      <button type="button" id="btn-close-camera" class="button danger">Cancel</button>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const fileInput = document.querySelector('input[type="file"][name="image"]');
    if (!fileInput) return;

    // 1. Enable direct camera capture for mobile browsers
    fileInput.setAttribute("accept", "image/*");
    fileInput.setAttribute("capture", "environment");

    // 2. Add custom Webcam button for desktop fallback
    const formGroup = document.getElementById("group-image");
    if (formGroup) {
      const cameraBtn = document.createElement("button");
      cameraBtn.type = "button";
      cameraBtn.className = "button";
      cameraBtn.style.marginTop = "8px";
      cameraBtn.style.display = "inline-flex";
      cameraBtn.style.alignItems = "center";
      cameraBtn.style.gap = "6px";
      cameraBtn.innerHTML = "📷 Use Live Camera";
      formGroup.appendChild(cameraBtn);

      // Create preview container
      const previewContainer = document.createElement("div");
      previewContainer.style.marginTop = "10px";
      previewContainer.style.display = "none";
      formGroup.appendChild(previewContainer);

      const modal = document.getElementById("camera-modal");
      const video = document.getElementById("webcam-preview");
      const canvas = document.getElementById("capture-canvas");
      const btnSnap = document.getElementById("btn-snap");
      const btnCloseCamera = document.getElementById("btn-close-camera");
      let stream = null;

      cameraBtn.addEventListener("click", async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
          });
          video.srcObject = stream;
          modal.style.display = "flex";
        } catch (err) {
          alert("Could not access camera: " + err.message);
        }
      });

      const stopCamera = () => {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
        modal.style.display = "none";
      };

      btnCloseCamera.addEventListener("click", stopCamera);

      btnSnap.addEventListener("click", () => {
        const ctx = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob((blob) => {
          const file = new File([blob], "camera_capture.jpg", { type: "image/jpeg" });
          const dt = new DataTransfer();
          dt.items.add(file);
          fileInput.files = dt.files;

          // Render live preview on form
          previewContainer.innerHTML = `
            <div style="position: relative; display: inline-block;">
              <img src="${URL.createObjectURL(blob)}" style="max-width: 150px; border-radius: 8px; border: 1px solid var(--line);">
              <span style="position: absolute; top: -5px; right: -5px; background: var(--success); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px;">✓</span>
            </div>
            <p style="margin: 4px 0 0 0; font-size: 12px; color: var(--success);">Photo captured successfully!</p>
          `;
          previewContainer.style.display = "block";

          stopCamera();
        }, "image/jpeg");
      });
    }
  });
</script>
{% endblock %}
